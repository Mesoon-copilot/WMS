<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Print Label WMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --ink:#111827; --muted:#6b7280;
      --line:#dbe2ea; --primary:#1d4ed8; --shadow:0 20px 50px rgba(15,23,42,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:radial-gradient(circle at top right,#dbeafe 0,#f5f7fb 45%,#eff6ff 100%);
      font-family:"Kanit","Segoe UI",sans-serif; color:var(--ink);
      padding:18px;
    }
    .card{
      width:min(100%,460px); background:var(--card); border:1px solid var(--line);
      border-radius:24px; padding:28px; box-shadow:var(--shadow);
    }
    .brand{display:flex; align-items:center; gap:14px; margin-bottom:18px}
    .logo{
      width:58px; height:58px; border-radius:18px; display:grid; place-items:center;
      background:linear-gradient(135deg,#1d4ed8,#0f172a); color:#fff; font-size:28px;
    }
    h1{margin:0; font-size:28px; line-height:1.1}
    .sub{margin-top:4px; color:var(--muted); font-size:14px}
    label{display:block; margin:12px 0 6px; font-size:13px; font-weight:500}
    input{
      width:100%; height:46px; border:1px solid #b8c4d3; border-radius:14px;
      padding:0 14px; font:inherit; outline:none;
    }
    input:focus{border-color:#1d4ed8; box-shadow:0 0 0 3px rgba(29,78,216,.12)}
    button{
      width:100%; height:48px; margin-top:18px; border:0; border-radius:14px;
      background:#1d4ed8; color:#fff; font:600 16px/1 "Kanit","Segoe UI",sans-serif; cursor:pointer;
    }
    .demo{
      margin-top:18px; padding:12px 14px; border-radius:14px; background:#f8fafc; color:#475569;
      font-size:13px; line-height:1.6;
    }
    .msg{min-height:24px; margin-top:10px; font-size:13px; font-weight:500}
    .msg.err{color:#b91c1c}
    .msg.ok{color:#166534}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">📦</div>
      <div>
        <h1>Print Label WMS</h1>
        <div class="sub">เข้าสู่ระบบเพื่อใช้งานเมนูหลักของระบบ</div>
      </div>
    </div>

    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" placeholder="เช่น admin" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="เช่น 1234" />
      <button type="submit">Login</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="demo">
      ตัวอย่างผู้ใช้สำหรับเริ่มต้น:<br>
      สำหรับเจ้าหน้าที่ 1234 / 1234<br>
      operator / 1234<br>
      viewer / 1234
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const res = window.APP_AUTH.login(
        document.getElementById("username").value,
        document.getElementById("password").value
      );
      if (!res.ok) {
        msg.className = "msg err";
        msg.textContent = res.error;
        return;
      }
      msg.className = "msg ok";
      msg.textContent = "เข้าสู่ระบบสำเร็จ กำลังไปหน้า Dashboard...";
      setTimeout(() => location.href = "dashboard.html", 250);
    });
  </script>
</body>
</html>
